services:
  tenseal-fhe:
    build:
      context: ./tenseal-service
      dockerfile: Dockerfile
    ports:
      - "9101:9101"
    environment:
      PORT: "9101"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9101/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5
