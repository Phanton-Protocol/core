name: PR Guard

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend-syntax-smoke:
    name: Backend Syntax Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: phantom-relayer-dashboard/backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix phantom-relayer-dashboard/backend

      - name: Syntax check backend
        run: node phantom-relayer-dashboard/backend/scripts/check-syntax.cjs

  frozen-config-guard:
    name: Frozen Config Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify frozen production config has version
        run: |
          node -e "const c=require('./frozenProductionConfig.json'); if(!c||!String(c.version||'').trim()){throw new Error('frozenProductionConfig.json missing version');} console.log('Frozen config version:', c.version);"
